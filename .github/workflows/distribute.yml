name: Distribute

on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'Release notes for this build'
        required: false
        default: ''
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  distribute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle files
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: medlog-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Post download link to commit
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const artifact = artifacts.data.artifacts.find(a => a.name === 'medlog-debug-apk');
            if (artifact) {
              const downloadUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${artifact.id}`;
              const notes = `${{ github.event.inputs.notes || '' }}`;
              const body = `## 🧪 Build Ready\n\n**Debug APK**: [Download Artifacts](${downloadUrl})\n\n${notes ? `**Notes**: ${notes}\n\n` : ''}Commit: \`${context.sha.substring(0, 7)}\``;
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body: body,
              });
            }

      - name: Create/Update Nightly Release
        if: success()
        run: |
          RELEASE_BODY="## 🧪 Nightly Build\n\n**Commit**: ${{ github.sha }}\n**Date**: $(date -u '+%Y-%m-%d %H:%M UTC')\n"
          if [ -n "${{ github.event.inputs.notes }}" ]; then
            RELEASE_BODY="${RELEASE_BODY}\n**Notes**: ${{ github.event.inputs.notes }}\n"
          fi

          # Delete existing nightly release if it exists
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

          # Create new nightly release
          gh release create nightly \
            --title "🧪 Nightly Build — MedLog" \
            --notes "$RELEASE_BODY" \
            --prerelease \
            app/build/outputs/apk/debug/*.apk
        env:
          GH_TOKEN: ${{ github.token }}
